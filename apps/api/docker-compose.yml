services:
  app:
    container_name: loondry-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    depends_on:
      loondry-db:
        condition: service_healthy
    networks:
      - loondry-net

  loondry-db:
    container_name: loondry-db
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: loondry
      MYSQL_USER: loondry
      MYSQL_PASSWORD: loondry_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "33060:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - loondry-net

  phpmyadmin:
    container_name: loondry-pma
    image: phpmyadmin/phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: loondry-db
      PMA_USER: loondry
      PMA_PASSWORD: loondry_secret
    depends_on:
      - loondry-db
    networks:
      - loondry-net

volumes:
  db_data:

networks:
  loondry-net:
    driver: bridge
